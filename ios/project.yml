name: Manakin
options:
  bundleIdPrefix: com.codylimber
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_CFBundleDisplayName: "Manakin"

targets:
  Manakin:
    type: application
    platform: iOS
    sources:
      - path: Manakin
        excludes:
          - "Resources/datasets/**"
          - "Resources/Sounds/**"
    resources:
      - path: Manakin/Resources/datasets
        buildPhase: resources
        type: folder
      - path: Manakin/Resources/Sounds
        buildPhase: resources
        type: folder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.codylimber.manakin
        PRODUCT_NAME: Manakin
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: "com.codylimber.manakin.weeklyDigest"
    entitlements:
      path: Manakin/Manakin.entitlements
